<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>填寫座位偏好 — 換個座位</title>
    <meta name="description" content="填寫你的座位偏好條件，系統會依照全班偏好進行最佳化分配。">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <h1>換個座位</h1>
    <div class="subtitle">依照學生要求畫出最合適的座位表</div>

    <!-- 學生條件輸入 -->
    <section id="input-page" class="page-section page-enter">
        <h2>填寫座位偏好</h2>
        <p id="student-status-wrapper">目前輸入學生:
            <span id="current-student-status" style="font-weight: bold; color: var(--primary-color);">0 / ?</span>
        </p>

        <div id="student-form-container">
            <div class="form-row">
                <div class="form-group">
                    <label for="student-id">你的座號:</label>
                    <input type="number" id="student-id" min="1">
                </div>
                <div class="form-group">
                    <label for="student-name">你的姓名:</label>
                    <input type="text" id="student-name" placeholder="例如: 謝新達">
                </div>
            </div>

            <fieldset>
                <legend>座位偏好條件</legend>
                <p>請依優先順序填寫你的座位偏好條件，條件越前面代表優先權越高。<br>若沒有特別偏好，請留空。</p>
                <div id="condition-list">
                    <!-- 條件 1：想跟誰坐 -->
                    <div class="condition-group" draggable="true">
                        <div class="drag-handle">≡</div>
                        <div class="reorder-buttons">
                            <button type="button" class="reorder-btn" onclick="moveConditionUp(this)" aria-label="上移">▲</button>
                            <button type="button" class="reorder-btn" onclick="moveConditionDown(this)" aria-label="下移">▼</button>
                        </div>
                        <label for="pref-1-id">想跟誰坐:</label>
                        <input type="number" class="preference-id" id="pref-1-id" placeholder="好友座號">
                    </div>

                    <!-- 條件 2：想跟誰坐（第二位） -->
                    <div class="condition-group" draggable="true">
                        <div class="drag-handle">≡</div>
                        <div class="reorder-buttons">
                            <button type="button" class="reorder-btn" onclick="moveConditionUp(this)" aria-label="上移">▲</button>
                            <button type="button" class="reorder-btn" onclick="moveConditionDown(this)" aria-label="下移">▼</button>
                        </div>
                        <label for="pref-2-id">想跟誰坐:</label>
                        <input type="number" class="preference-id" id="pref-2-id" placeholder="好友座號">
                    </div>

                    <!-- 條件 3：前後偏好 -->
                    <div class="condition-group" draggable="true">
                        <div class="drag-handle">≡</div>
                        <div class="reorder-buttons">
                            <button type="button" class="reorder-btn" onclick="moveConditionUp(this)" aria-label="上移">▲</button>
                            <button type="button" class="reorder-btn" onclick="moveConditionDown(this)" aria-label="下移">▼</button>
                        </div>
                        <label for="pref-5-val">想坐前後:</label>
                        <select id="pref-5-val">
                            <option value="不限">不限</option>
                            <option value="前">前</option>
                            <option value="中">中</option>
                            <option value="後">後</option>
                        </select>
                    </div>

                    <!-- 條件 4：左右偏好 -->
                    <div class="condition-group" draggable="true">
                        <div class="drag-handle">≡</div>
                        <div class="reorder-buttons">
                            <button type="button" class="reorder-btn" onclick="moveConditionUp(this)" aria-label="上移">▲</button>
                            <button type="button" class="reorder-btn" onclick="moveConditionDown(this)" aria-label="下移">▼</button>
                        </div>
                        <label for="pref-6-val">想坐左右:</label>
                        <select id="pref-6-val">
                            <option value="不限">不限</option>
                            <option value="左">左</option>
                            <option value="中">中</option>
                            <option value="右">右</option>
                        </select>
                    </div>
                </div>
            </fieldset>

            <!-- 按鈕區：線下模式顯示三個按鈕，線上模式只顯示「確認送出」 -->
            <div id="offline-btn-group" class="hidden" style="display: flex; gap: 10px; flex-wrap: wrap; margin-top: 16px;">
                <button onclick="goBackFromInput()" class="btn-secondary">返回</button>
                <button onclick="submitStudentPreferences()" class="btn-primary" style="flex: 1;">下一步</button>
                <button onclick="generateSeatsNow()" class="btn-warning">生成座位</button>
            </div>
            <div id="online-btn-group" class="hidden" style="margin-top: 10px;">
                <button onclick="submitStudentPreferences()" class="btn-primary" style="width: 100%;">確認送出</button>
            </div>
        </div>
    </section>

    <div class="footer-info">
        <p>換個座位 · 自動化座位配置工具</p>
    </div>

    <script src="input.js" type="module"></script>
</body>
</html>
