<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>排座位終結者</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <h1>排座位終結者</h1>
    <section id="setup-page" class="page-section">
        <h2>階段 I: 教室與學生座號設定</h2>
        <p>基本上是很少有老師會瘋到讓班長排座位啦，但班長不想要把責任都丟在自己身上，所以就做了這東西。</p>
        <p>身為一個高一資訊科技課被當掉的文組生，以下所以程式都是AI寫的，我只是給個想法然後安裝。</p>
        <p>建國中學79屆201 王宥鈞(2025.10.17)。</p>
        <div class="form-group">
            <label for="class-name">班級名稱:</label>
            <input type="text" id="class-name" placeholder="例如: 高一201班">
        </div>
            <div id="error-message" class="error-msg"></div>
        <div class="form-group">
            <label for="rows">教室排數 (前後):</label>
            <input type="number" id="rows" min="1" value="5">
        </div>
        <div class="form-group">
            <label for="cols">教室列數 (左右):</label>
            <input type="number" id="cols" min="1" value="6">
        </div>
        <div class="form-group">
            <label for="min-id">學生最小座號:</label>
            <input type="number" id="min-id" min="1" value="1">
        </div>
        <div class="form-group">
            <label for="max-id">學生最大座號:</label>
            <input type="number" id="max-id" value="30">
        </div>
        <div class="form-group">
            <label for="excluded-ids">需排除的座號 (以逗號分隔, 如: 4,7,29):</label>
            <input type="text" id="excluded-ids" placeholder="無則留空">
        </div>
        <button onclick="startStudentInput()">開始學生輸入</button>
    </section>

    <section id="input-page" class="page-section hidden">
        <h2>階段 II: 學生條件輸入</h2>
        <p>目前輸入學生: <span id="current-student-status">1 / ?</span></p>

        <div id="student-form-container">
            <div class="form-group">
                <label for="student-id">輸入你的座號:</label>
                <input type="number" id="student-id" min="1">
            </div>
            <div class="form-group">
                <label for="student-name">輸入你的姓名:</label>
                <input type="text" id="student-name">
            </div>

            <fieldset>
                <legend>六項座位偏好條件</legend>
                <div class="condition-group">
                    <label>想跟誰坐:</label> <input type="number" class="preference-id" id="pref-1-id">
                    <label>權重 (1-4):</label> <input type="number" class="weight-input" min="1" max="4" id="pref-1-w">
                </div>
                <div class="condition-group">
                    <label>想跟誰坐:</label> <input type="number" class="preference-id" id="pref-2-id">
                    <label>權重 (1-4):</label> <input type="number" class="weight-input" min="1" max="4" id="pref-2-w">
                </div>
                <div class="condition-group">
                    <label>想坐前後:</label>
                    <select id="pref-5-val">
                        <option value="不限">不限</option>
                        <option value="前">前面</option>
                        <option value="中">中間</option>
                        <option value="後">後面</option>
                    </select>
                    <label>權重 (1-4):</label> <input type="number" class="weight-input" min="1" max="4" id="pref-5-w">
                </div>
                <div class="condition-group">
                    <label>想坐左右:</label>
                    <select id="pref-6-val">
                        <option value="不限">不限</option>
                        <option value="左">左邊</option>
                        <option value="中">中間</option>
                        <option value="右">右邊</option>
                    </select>
                    <label>權重 (1-4):</label> <input type="number" class="weight-input" min="1" max="4" id="pref-6-w">
                </div>
            </fieldset>

            <button onclick="submitStudentPreferences()">確認輸入</button>
        </div>
    </section>

<section id="result-page" class="page-section hidden">
    <h2>階段 III: 座位分配結果</h2>
    <p>分配依據: 權重高 > 隨機判定。<b>(提示: 可拖曳座位方塊來交換學生位置)</b></p>
    
    <div id="seat-map-container">
        </div>
            <button onclick="distributeSeats()" id="redistribute-btn">重新分配</button>
    <button onclick="downloadDoc()" id="download-btn">下載為 DOC 檔案</button>
</section>

    <script src="script.js"></script>
</body>

</html>
